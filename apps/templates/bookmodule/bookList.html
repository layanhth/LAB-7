{% extends "layouts/base.html" %}

{% block title %} Book List {% endblock title %}

{% block content %}
<h1>Books</h1>

<ul>
    {% for book in books %}
        <li>
            ID: {{ book.id }}, Title: {{ book.title }}, Author: {{ book.author }}
        </li>
    {% endfor %}
</ul>
{% endblock content %}
